<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Complete - autocad-mcp</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .success-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.15);
      color: var(--success);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }
    .success-box h1 { font-size: 1.75rem; margin-bottom: 0.75rem; }
    .success-box p { color: var(--text-muted); margin-bottom: 1.5rem; }
    .license-key-box {
      background: var(--bg);
      border: 2px solid var(--success);
      border-radius: 12px;
      padding: 1.5rem;
      margin: 1.5rem 0;
    }
    .license-key-box label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .license-key {
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--success);
      letter-spacing: 1px;
      word-break: break-all;
      user-select: all;
    }
    .copy-btn {
      margin-top: 0.75rem;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
    }
    .instructions {
      text-align: left;
      background: var(--bg);
      border-radius: 8px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }
    .instructions h3 { font-size: 0.95rem; margin-bottom: 0.75rem; }
    .instructions code {
      display: block;
      background: var(--bg-card);
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      margin: 0.5rem 0;
      font-size: 0.85rem;
      color: var(--primary-light);
      overflow-x: auto;
    }
    .order-details {
      text-align: left;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .order-details p { font-size: 0.9rem; margin-bottom: 0.25rem; }
    .order-details strong { color: var(--text); }
    .loading { color: var(--text-muted); font-size: 1.1rem; }
    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      border-radius: 8px;
      padding: 1rem;
      color: var(--error);
    }
  </style>
</head>
<body>
  <div class="success-page">
    <div class="success-box" id="content">
      <p class="loading">Retrieving your license key...</p>
    </div>
  </div>

  <script>
    (async function() {
      const content = document.getElementById("content");
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get("session_id");

      if (!sessionId) {
        content.innerHTML = '<div class="error-box">No session ID found. If you completed a purchase, please contact support.</div>';
        return;
      }

      try {
        const response = await fetch("/.netlify/functions/get-key?session_id=" + encodeURIComponent(sessionId));
        const data = await response.json();

        if (data.error) {
          content.innerHTML = '<div class="error-box">Error: ' + data.error + '<br><br>Please contact support with your session ID: ' + sessionId + '</div>';
          return;
        }

        content.innerHTML = `
          <div class="success-icon">&#10003;</div>
          <h1>Purchase Complete!</h1>
          <p>Thank you for your purchase. Your license key is ready.</p>

          <div class="license-key-box">
            <label>Your License Key</label>
            <div class="license-key" id="keyText">${data.licenseKey}</div>
            <button class="btn btn-secondary copy-btn" onclick="copyKey()">Copy to Clipboard</button>
          </div>

          <div class="order-details">
            <p><strong>Order ID:</strong> ${data.orderId || sessionId.slice(0, 16)}</p>
            <p><strong>Plan:</strong> ${data.plan === 'yearly' ? 'Yearly (365 days)' : 'Monthly (30 days)'}</p>
            <p><strong>Expires:</strong> ${data.expires || 'N/A'}</p>
            <p><strong>Machine ID:</strong> <code style="display:inline;background:var(--bg-card);padding:0.1rem 0.4rem;border-radius:3px;font-size:0.8rem;">${data.machineId}</code></p>
            <p style="margin-top:0.75rem;font-size:0.8rem;color:var(--text-muted);">A receipt has been sent to your email by Stripe.</p>
          </div>

          <div class="instructions">
            <h3>How to activate</h3>
            <p style="color:var(--text-muted);font-size:0.85rem;">Option 1: Set environment variable</p>
            <code>set ACAD_LICENSE_KEY=${data.licenseKey}</code>
            <p style="color:var(--text-muted);font-size:0.85rem;margin-top:0.5rem;">Option 2: Save to file</p>
            <code>echo ${data.licenseKey} > %USERPROFILE%\\.autocad-mcp-license</code>
          </div>

          <a href="/" class="btn btn-secondary" style="margin-top:1.5rem;">Back to Home</a>
        `;
      } catch (err) {
        content.innerHTML = '<div class="error-box">Network error. Please try again or contact support.<br>Session ID: ' + sessionId + '</div>';
      }
    })();

    function copyKey() {
      const keyText = document.getElementById("keyText").textContent;
      navigator.clipboard.writeText(keyText).then(function() {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "Copied!";
        setTimeout(function() { btn.textContent = "Copy to Clipboard"; }, 2000);
      });
    }
  </script>
</body>
</html>
